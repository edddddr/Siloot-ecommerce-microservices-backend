version: '3.9'

services:
  order-db:
    image: postgres:15
    container_name: order-db
    env_file:
      - .env
    volumes:
      - order_db_data:/var/lib/postgresql/data
    ports:
      - "5437:5432"

  order-redis:
    image: redis:7
    container_name: order-redis
    ports:
      - "6384:6379"

  order-service:
    build: .
    container_name: order-service
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./app:/app
    ports:
      - "8005:8000"
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.dev  
    depends_on:
      - order-db
      - order-redis

volumes:
  order_db_data: