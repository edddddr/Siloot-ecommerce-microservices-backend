events {
    worker_connections 1024;
}

http {
    # --- Performance Optimizations ---
    tcp_nopush on;
    tcp_nodelay on; # Disables Nagle's algorithm for immediate packet sending
    
    # Resolver for EKS (CoreDNS). Allows Nginx to find pods dynamically.
    resolver 10.100.0.10 valid=30s;

    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=20r/s; # Increased slightly

    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time uct="$upstream_connect_time" uat="$upstream_header_time"';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;
    
    # --- Global Proxy Settings ---
    proxy_http_version 1.1;
    proxy_set_header Connection ""; # Required for keepalive to work
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_connect_timeout 5s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    # --- Auth & Request ID Maps ---
    map $http_authorization $auth_header_present {
        default 1;
        "" 0;
    }

    map $http_x_request_id $req_id {
        default $http_x_request_id;
        "" $request_id;
    }

    # --- Upstreams with Connection Pooling (The Speed Fix) ---
    upstream auth-service {
        server auth-service:8000;
        keepalive 32; 
    }

    upstream product-service {
        server product-service:8000;
        keepalive 32;
    }

    upstream inventory-service {
        server inventory-service:8000;
        keepalive 32;
    }

    upstream cart-service {
        server cart-service:8000;
        keepalive 32;
    }

    upstream order-service {
        server order-service:8000;
        keepalive 32;
    }

    upstream payment-service {
        server payment-service:8000;
        keepalive 32;
    }

    server {
        listen 80;

        # Security Headers
        add_header X-Frame-Options DENY;
        add_header X-Content-Type-Options nosniff;
        add_header X-XSS-Protection "1; mode=block";
        add_header Referrer-Policy no-referrer-when-downgrade;
        add_header Content-Security-Policy "default-src 'self';";
        add_header X-Request-ID $req_id;

        # Rate Limiting
        limit_req zone=api_limit burst=30 nodelay;

        # Standard Client Timeouts
        client_max_body_size 10M;
        client_body_timeout 10s;
        client_header_timeout 10s;
        keepalive_timeout 65s; # Keep client-side connections open longer

        # --- Routes ---

        location /api/v1/auth/ {
            proxy_pass http://auth-service;
            proxy_set_header X-Request-ID $req_id;
        }

        location /api/v1/products/ {
            proxy_pass http://product-service;
        }

        location /api/v1/categories/ {
            proxy_pass http://product-service;
        }

        location /api/v1/inventory/ {
            proxy_pass http://inventory-service;
        }

        location /api/v1/cart/ {
            # if ($auth_header_present = 0) { return 401; }
            proxy_pass http://cart-service;
        }

        location /api/v1/orders/ {
            if ($auth_header_present = 0) { return 401; }
            proxy_pass http://order-service;
        }

        location /api/v1/payments/ {
            if ($auth_header_present = 0) { return 401; }
            proxy_pass http://payment-service;
        }

        location /metrics {
            stub_status;
            allow 127.0.0.1; # Recommended: only local or Prometheus access
            # allow 10.0.0.0/8; # Adjust to your VPC range
            deny all;
        }

        location / {
            return 404;
        }
    }
}
    