events {}

http {
    
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

    log_format main '$remote_addr - $remote_user [$time_local] '
                '"$request" $status $body_bytes_sent '
                '"$http_referer" "$http_user_agent" '
                'rt=$request_time';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;
    
    
    proxy_http_version 1.1;
    proxy_set_header Connection "";


    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_connect_timeout 5s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    map $http_authorization $auth_header_present {
            default 1;
            "" 0;
        }

    upstream auth-service {
        server auth-service:8000;
    }

    upstream product-service {
        server product-service:8000;
    }

    upstream inventory-service {
        server inventory-service:8000;
    }

    upstream cart-service {
        server cart-service:8000;
    }

    upstream order-service {
        server order-service:8000;
    }

    upstream payment-service {
        server payment-service:8000;
    }

    server {

        listen 80;

        add_header X-Frame-Options DENY;
        add_header X-Content-Type-Options nosniff;
        add_header X-XSS-Protection "1; mode=block";
        add_header Referrer-Policy no-referrer-when-downgrade;
        add_header Content-Security-Policy "default-src 'self';";

        access_log /var/log/nginx/access.log main;

        limit_req zone=api_limit burst=20 nodelay;
    


        # Auth Service
        location /api/v1/auth/ {
            proxy_pass http://auth-service;
        }

        # Product Service
        location /api/v1/products/ {
            proxy_pass http://product-service;
        }

        # Inventory Service
        location /api/v1/inventory/ {
        #     if ($auth_header_present = 0) {
        #     return 401;
        #     }

            proxy_pass http://inventory-service;
        }

        # Cart Service
        location /api/v1/cart/ {
            if ($auth_header_present = 0) {
            return 401;
            }

            proxy_pass http://cart-service;
        }

        # Order Service
        location /api/v1/orders/ {
            if ($auth_header_present = 0) {
            return 401;
            }

            proxy_pass http://order-service;
        }

        # Payment Service
        location /api/v1/payments/ {
            if ($auth_header_present = 0) {
            return 401;
            }

            proxy_pass http://payment-service;
        }

        location / {
            return 404;
        }
    }
}