apiVersion: v1
kind: ConfigMap
metadata:
  name: order-config
  namespace: ecommerce
data:
  POSTGRES_HOST: postgres.data.svc.cluster.local
  POSTGRES_PORT: "5432"

  # REDIS_HOST: redis.data.svc.cluster.local
  # REDIS_PORT: "6379"

  AUTH_SERVICE_URL: http://auth-service.ecommerce.svc.cluster.local:8000/auth
  INVENTORY_SERVICE_URL: http://inventory-service.ecommerce.svc.cluster.local:8000
  CART_SERVICE_URL: http://cart-service.ecommerce.svc.cluster.local:8000

  RABBITMQ_HOST: rabbitmq.messaging.svc.cluster.local
  RABBITMQ_PORT: "5672"

  DJANGO_SETTINGS_MODULE: config.settings.dev