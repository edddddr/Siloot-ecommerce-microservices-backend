apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: ecommerce
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: 949839457616.dkr.ecr.eu-north-1.amazonaws.com/ecommerce/auth-service:f3ed2bf30a60b9fb90f3b2fce8c2d337e4a052a8
          ports:
            - containerPort: 8001

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"  

          envFrom:
            - configMapRef:
                name: auth-config
            - secretRef:
                name: auth-secret

          readinessProbe:
            httpGet:
              path: /api/v1/auth/health/
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5

          livenessProbe:
            httpGet:
              path: /api/v1/auth/health/
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 10