apiVersion: apps/v1
kind: Deployment
metadata:
  name: product-service
  namespace: ecommerce
spec:
  replicas: 1
  selector:
    matchLabels:
      app: product-service
  template:
    metadata:
      labels:
        app: product-service
    spec:
      containers:
        - name: product-service
          image: edddddr/product-service:latest
          ports:
            - containerPort: 8000

          envFrom:
            - configMapRef:
                name: product-config
            - secretRef:
                name: product-secret

          readinessProbe:
            httpGet:
              path: /api/v1/products/
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5

          livenessProbe:
            httpGet:
              path: /api/v1/products/
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 10