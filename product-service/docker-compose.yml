version: '3.9'

services:
  product-db:
    image: postgres:15
    container_name: product-db
    env_file:
      - .env
    volumes:
      - product_db_data:/var/lib/postgresql/data
    ports:
      - "5434:5432"

  product-redis:
    image: redis:7
    container_name: product-redis
    ports:
      - "6380:6379"

  product-service:
    build: .
    container_name: product-service
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./app:/app
    ports:
      - "8002:8000"
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.dev  
    depends_on:
      - product-db
      - product-redis

volumes:
  product_db_data: